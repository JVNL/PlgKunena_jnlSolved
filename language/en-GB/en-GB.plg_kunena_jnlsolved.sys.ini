PLG_KUNENA_JNLSOLVED="Joomla!NL - Solved plugin"
PLG_KUNENA_JNLSOLVED_DESCRIPTION="A plug-in developed by Team Joomla!NL to let topics be marked as solved."

PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_LABEL="Marker text:"
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_DESC="This text is prepended to the title of a solved topic and used to detect whether a topic is already solved."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_ADMIN_LABEL="Visible to admins:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_ADMIN_DESC="Makes the button available to admins on your Kunena forum."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_MODERATOR_LABEL="Visible to moderators:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_MODERATOR_DESC="Makes the button available to moderators on your Kunena forum."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_TOPIC_STARTER_LABEL="Visible to topic starter:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_TOPIC_STARTER_DESC="Makes the button available to the topic starter on your Kunena forum."
PLG_KUNENA_JNLSOLVED_LOCK_SOLVED_LABEL="Close when solved:"
PLG_KUNENA_JNLSOLVED_LOCK_SOLVED_DESC="Automatically close topics when they are marked as solved."
PLG_KUNENA_JNLSOLVED_DO_LAST_POST_LABEL="Topic starter must have last post:"
PLG_KUNENA_JNLSOLVED_DO_LAST_POST_LABEL_DESC="If yes: the topic starter must have posted the last reply before the button appears. A topic also needs at least 2 posts. Does not apply to moderators and administrators."
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_RENAME_LABEL="Prepend topic title:"
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_RENAME_DESC="Prepend the topic title with the marker text once it is solved."
