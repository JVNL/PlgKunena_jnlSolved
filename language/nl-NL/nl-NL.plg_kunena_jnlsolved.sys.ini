PLG_KUNENA_JNLSOLVED="Joomla!NL - Opgelost plugin"
PLG_KUNENA_JNLSOLVED_DESCRIPTION="Een plug-in ontwikkeld door Team Joomla!NL. Bedoeld om topics op opgelost te zetten."

PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_LABEL="Markeringstekst:"
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_DESC="Deze tekst wordt voor de titel van een opgelost topic geplaatst en gebruikt om te herkennen of een topic al is opgelost."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_ADMIN_LABEL="Zichtbaar voor admins:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_ADMIN_DESC="Maakt de knop beschikbaar voor admins op je Kunena forum."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_MODERATOR_LABEL="Zichtbaar voor moderators:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_MODERATOR_DESC="Maakt de knop beschikbaar voor moderators op je Kunena forum."
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_TOPIC_STARTER_LABEL="Zichtbaar voor topicstarter:"
PLG_KUNENA_JNLSOLVED_ENABLE_FOR_TOPIC_STARTER_DESC="Maakt de knop beschikbaar voor de topicstarter op je Kunena forum."
PLG_KUNENA_JNLSOLVED_LOCK_SOLVED_LABEL="Sluit bij oplossen?"
PLG_KUNENA_JNLSOLVED_LOCK_SOLVED_DESC="Sluit het topic automatisch zodra het als opgelost wordt gemarkeerd."
PLG_KUNENA_JNLSOLVED_DO_LAST_POST_LABEL="Topicstarter moet laatste post hebben:"
PLG_KUNENA_JNLSOLVED_DO_LAST_POST_LABEL_DESC="Indien Ja: de topicstarter moet als laatste hebben geantwoord voordat de knop verschijnt. Een topic moet daarnaast minimaal 2 posts bevatten. Geldt niet voor moderators en administrators."
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_RENAME_LABEL="Titel aanpassen bij oplossen:"
PLG_KUNENA_JNLSOLVED_TOPIC_SOLVED_RENAME_DESC="Zet de markeringstekst voor de titel van het topic zodra het wordt opgelost."
